version: '3.8'

services:
  backend:
    build:
      context: ./backend
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
      - ./shared:/app/shared
    networks:
      - app-network

  frontend:
    build:
      context: ./frontend
    ports:
      - "5001:5001"
    volumes:
      - ./frontend:/app
      - ./backend:/app/backend
      - ./shared:/app/shared
    networks:
      - app-network
    environment:
      - FLASK_RUN_PORT=5001
      - START_MASTER_WITH_UI=0
    depends_on:
      - backend

  client-agent:
    build:
      context: ./client-agent
    volumes:
      - ./client-agent/test_scan:/app/scan
    networks:
      - app-network
    environment:
      - MASTER_IP=backend
      - MASTER_PORT=5000
      - SCAN_DIRS=/app/scan
    depends_on:
      - backend

networks:
  app-network:
    driver: bridge