services:
  backend:
    build:
      context: ./backend
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
      - ./shared:/app/shared
    networks:
      - app-network
    environment:
      - APP_DB_PATH=/app/shared/data/app.db

  frontend:
    build:
      context: ./frontend
    ports:
      - "5001:5000"  # Changed external port to 5001 to avoid conflict
    volumes:
      - ./frontend:/app
      - ./backend:/app/backend  # Share backend directory with frontend
      - ./shared:/app/shared  # Share shared directory with frontend
      - ./backend/network:/app/network  # Share network directory with frontend
    networks:
      - app-network
    environment:
      - FLASK_RUN_PORT=5000  # Container listens on 5000, exposed as host 5001
      - APP_DB_PATH=/app/shared/data/app.db
      - START_MASTER_WITH_UI=0  # Use dedicated backend service as the only TCP master

  client-agent:
    build:
      context: ./client-agent
    volumes:
      - ./shared/quarantine:/quarantine
      - ./shared/client-logs:/logs
    networks:
      - app-network
    env_file:
      - ./.env.client
    environment:
      - BACKEND_HOST=backend  # Use backend service name as hostname
      - BACKEND_PORT=5000
      - QUARANTINE_DIR=/quarantine
      - LOG_DIR=/logs

networks:
  app-network:
    driver: bridge
